<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Energy Blueprint — Destiny Code</title>
<meta name="description" content="Your complete BaZi Energy Blueprint — personality, relationships, career path, and life chapters.">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0c14;--surface:#111520;--border:#1e2433;--text:#c8ccd6;--text-dim:#6b7280;--gold:#c9a96e;--gold-dim:#8b7348}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(90,110,140,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
  .container{max-width:720px;margin:0 auto;padding:40px 24px 60px;position:relative;z-index:1}
  nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
  nav a{color:var(--text-dim);text-decoration:none;font-size:14px}
  nav a:hover{color:var(--gold)}
  .logo{font-size:18px;color:var(--text);font-weight:600}
  .logo span{color:var(--gold)}
  .hero{text-align:center;margin-bottom:32px}
  .hero h1{font-size:26px;color:#e8ecf1;margin-bottom:4px}
  .hero .dm{font-size:48px;color:var(--gold);font-weight:700;margin:12px 0 4px;letter-spacing:-1px}
  .hero .dm small{font-size:20px;font-weight:400}
  .hero .sub{font-size:14px;color:var(--text-dim)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:16px}
  .card h2{font-size:16px;color:#d8dce3;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .card h2 .icon{font-size:18px}
  .card p,.card li{font-size:14px;color:var(--text-dim);line-height:1.7}
  .card ul{margin:8px 0 0 20px}
  .card li{margin-bottom:6px}
  .pillars{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pillar{background:#0a0c14;border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
  .pillar .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .pillar .ganzhi{font-size:22px;color:#e8ecf1;font-weight:600}
  .elements{display:flex;gap:8px;margin-top:12px}
  .el{flex:1;text-align:center;padding:10px 4px;border-radius:6px;background:#0a0c14;border:1px solid var(--border)}
  .el .name{font-size:11px;color:var(--text-dim);margin-bottom:2px}
  .el .count{font-size:18px;font-weight:700}
  .el.dominant{border-color:var(--gold-dim)}
  .el.dominant .count{color:var(--gold)}
  .cta{background:var(--surface);border:1px solid var(--gold-dim);border-radius:10px;padding:24px;text-align:center;margin-top:24px}
  .cta h2{color:var(--gold);margin-bottom:8px;font-size:18px}
  .cta p{color:var(--text-dim);font-size:13px;margin-bottom:16px}
  .cta button{display:inline-block;background:var(--gold);color:var(--bg);padding:12px 32px;border-radius:6px;text-decoration:none;font-weight:600;font-size:14px;border:none;cursor:pointer}
  .cta button:hover{opacity:0.9}
  .cta button:disabled{opacity:0.5;cursor:not-allowed}
  .blur-section{position:relative}
  .blur-section .blur-overlay{position:absolute;inset:0;background:linear-gradient(transparent 0%, var(--bg) 95%);border-radius:10px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:20px}
  .blur-overlay span{color:var(--gold);font-size:13px;font-weight:600}
  .loading{text-align:center;padding:60px 0;color:var(--text-dim)}
  .error{text-align:center;padding:60px 0;color:#e0556a}
  .lock-badge{display:inline-block;background:var(--gold-dim);color:var(--bg);font-size:10px;padding:2px 8px;border-radius:3px;margin-left:8px;vertical-align:middle}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn 0.5s ease}
  @media(max-width:600px){.pillars{grid-template-columns:1fr 1fr}.hero .dm{font-size:36px}}
</style>
</head>
<body>
<div class="container">
  <nav>
    <a href="/" class="logo">☯ Destiny<span>Code</span></a>
    <a href="/">← Home</a>
  </nav>
  <div id="content" class="loading">
    <p>Generating your energy blueprint…</p>
  </div>
</div>

<script>
const CHECKOUT_LINK = 'https://hanhan.lemonsqueezy.com/checkout/buy/61cbe329-efcd-469c-8eb9-7ec7e6927376';
const VERIFY_API = '/api/verify-session';
const REPORT_API = '/api/report';
const params = new URLSearchParams(location.search);

const name = params.get('name') || 'Friend';
const year = params.get('year');
const month = params.get('month');
const day = params.get('day');
const hour = params.get('hour') || '12';
const checkoutId = params.get('checkout_id') || params.get('session_id'); // LemonSqueezy or legacy Stripe

if (!year || !month || !day) {
  // Try localStorage (return from checkout)
  const saved = localStorage.getItem('destiny_report_params');
  if (saved) {
    const p = JSON.parse(saved);
    window.location.search = `?name=${encodeURIComponent(p.name || 'Friend')}&year=${p.year}&month=${p.month}&day=${p.day}&hour=${p.hour || '12'}${checkoutId ? '&checkout_id=' + encodeURIComponent(checkoutId) : ''}`;
    return;
  }
  document.getElementById('content').innerHTML = '<div class="error"><p>Missing birth data. <a href="/" style="color:var(--gold)">Go back</a> to get your preview.</p></div>';
} else {
  init();
}

async function init() {
  // If we have a session_id, verify payment first
  if (checkoutId) {
    try {
      const verifyUrl = `${VERIFY_API}?checkout_id=${encodeURIComponent(checkoutId)}&name=${encodeURIComponent(name)}&year=${year}&month=${month}&day=${day}&hour=${hour}`;
      const r = await fetch(verifyUrl);
      const v = await r.json();
      if (v.paid && v.report) {
        return renderFull(v.report);
      }
      // Payment not complete — fall through to preview
    } catch(e) {
      console.error('Verify error:', e);
    }
  }

  // No valid session — show preview with Stripe CTA
  try {
    const reportUrl = `${REPORT_API}?name=${encodeURIComponent(name)}&year=${year}&month=${month}&day=${day}&hour=${hour}`;
    const r = await fetch(reportUrl);
    const d = await r.json();
    renderPreview(d);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error"><p>Something went wrong. <a href="/" style="color:var(--gold)">Try again</a>.</p></div>`;
  }
}

function renderPreview(d) {
  const els = d.elements;
  const elColors = {Wood:'#4a9',Fire:'#e55',Earth:'#c93',Metal:'#ccc',Water:'#59c'};
  const birthdate = `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  const birthtime = `${hour.padStart(2,'0')}:00`;

  document.getElementById('content').innerHTML = `
    <div class="hero fade-in">
      <p style="color:var(--text-dim);font-size:14px">Energy Blueprint for</p>
      <h1>${esc(d.name)}</h1>
      <div class="dm">${d.day_master} <small>(${d.day_master_wuxing})</small></div>
      <p class="sub">${d.day_master_yinyang} ${d.day_master_wuxing} Day Master · ${d.archetype}</p>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">🏛</span> Your Four Pillars</h2>
      <div class="pillars">
        <div class="pillar"><div class="label">Year</div><div class="ganzhi">${d.pillars.year}</div></div>
        <div class="pillar"><div class="label">Month</div><div class="ganzhi">${d.pillars.month}</div></div>
        <div class="pillar"><div class="label">Day ★</div><div class="ganzhi">${d.pillars.day}</div></div>
        <div class="pillar"><div class="label">Hour</div><div class="ganzhi">${d.pillars.hour}</div></div>
      </div>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">☯</span> Five Elements Balance</h2>
      <div class="elements">
        ${Object.entries(els).map(([el,c]) => `
          <div class="el ${el === d.dominant ? 'dominant' : ''}">
            <div class="name">${el}</div>
            <div class="count" style="color:${elColors[el]}">${c}</div>
          </div>
        `).join('')}
      </div>
      <p style="margin-top:12px;font-size:13px;color:var(--text-dim)">${d.balance_detail}</p>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">💫</span> Personality <span class="lock-badge">PREVIEW</span></h2>
      <p>${d.personality.strengths}</p>
    </div>

    <!-- Blurred gated sections -->
    <div class="card blur-section fade-in">
      <h2><span class="icon">❤</span> Relationships <span class="lock-badge">LOCKED</span></h2>
      <p style="filter:blur(6px);user-select:none">Your relationship patterns and compatibility insights are revealed in the complete blueprint. Discover how your elemental energy interacts with others.</p>
      <div class="blur-overlay"><span>🔒 Unlock Below</span></div>
    </div>

    <div class="card blur-section fade-in">
      <h2><span class="icon">🎯</span> Career Path <span class="lock-badge">LOCKED</span></h2>
      <p style="filter:blur(6px);user-select:none">Your ideal career direction, work environment, and professional strengths are mapped in detail. Align your career with your elemental nature for lasting fulfillment.</p>
      <div class="blur-overlay"><span>🔒 Unlock Below</span></div>
    </div>

    <div class="card blur-section fade-in">
      <h2><span class="icon">🌱</span> Growth Edge <span class="lock-badge">LOCKED</span></h2>
      <p style="filter:blur(6px);user-select:none">Your personal growth edge — the one insight that changes everything. Plus daily guidance aligned with your elemental rhythm.</p>
      <div class="blur-overlay"><span>🔒 Unlock Below</span></div>
    </div>

    <!-- Stripe CTA -->
    <div class="cta fade-in" id="stripe-cta">
      <h2>Unlock Your Complete Blueprint</h2>
      <p>Get the full 800+ word interpretation including personality deep-dive, relationship compatibility, career guidance, growth edge, and personalized daily practices.</p>
      <button id="checkout-btn" onclick="startCheckout()">
        Get Full Report — $29 →
      </button>
      <p style="font-size:11px;color:var(--text-dim);margin-top:8px">Instant delivery · Secure payment via Stripe · One-time purchase</p>
    </div>
  `;
}

function renderFull(d) {
  const els = d.elements;
  const elColors = {Wood:'#4a9',Fire:'#e55',Earth:'#c93',Metal:'#ccc',Water:'#59c'};

  document.getElementById('content').innerHTML = `
    <div class="hero fade-in">
      <p style="color:var(--text-dim);font-size:14px">Your Complete Energy Blueprint</p>
      <h1>${esc(d.name)}</h1>
      <div class="dm">${d.day_master} <small>(${d.day_master_wuxing})</small></div>
      <p class="sub">${d.day_master_yinyang} ${d.day_master_wuxing} Day Master · ${d.archetype}</p>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">🏛</span> Your Four Pillars</h2>
      <div class="pillars">
        <div class="pillar"><div class="label">Year</div><div class="ganzhi">${d.pillars.year}</div></div>
        <div class="pillar"><div class="label">Month</div><div class="ganzhi">${d.pillars.month}</div></div>
        <div class="pillar"><div class="label">Day ★</div><div class="ganzhi">${d.pillars.day}</div></div>
        <div class="pillar"><div class="label">Hour</div><div class="ganzhi">${d.pillars.hour}</div></div>
      </div>
      <p style="margin-top:12px;font-size:13px;color:var(--text-dim)">The Day Pillar (★) contains your Day Master — your core energetic identity.</p>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">☯</span> Five Elements Balance</h2>
      <div class="elements">
        ${Object.entries(els).map(([el,c]) => `
          <div class="el ${el === d.dominant ? 'dominant' : ''}">
            <div class="name">${el}</div>
            <div class="count" style="color:${elColors[el]}">${c}</div>
          </div>
        `).join('')}
      </div>
      <p style="margin-top:12px;font-size:13px;color:var(--text-dim)">${d.balance_detail}</p>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">💫</span> Personality</h2>
      <p>${d.personality.strengths}</p>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">❤</span> Relationships</h2>
      <p>${d.personality.relationships}</p>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">🎯</span> Career Path</h2>
      <p>${d.personality.career}</p>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">🌱</span> Growth Edge</h2>
      <p>${d.growth_edge}</p>
    </div>

    <div class="card fade-in">
      <h2><span class="icon">📅</span> Daily Guidance</h2>
      <p>${d.personality.daily}</p>
      <p style="margin-top:8px;font-size:13px;color:var(--text-dim)"><strong style="color:var(--gold)">Element Advice:</strong> ${d.element_advice}</p>
    </div>

    <div class="card fade-in" style="border-color:rgba(201,169,110,0.2);background:rgba(201,169,110,0.05);text-align:center">
      <p style="color:var(--gold);font-size:13px">✦ Thank you for investing in your self-knowledge ✦</p>
    </div>
  `;
}

async function startCheckout() {
  const btn = document.getElementById('checkout-btn');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Redirecting to secure checkout…';

  const birthdate = `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
  const birthtime = `${hour.padStart(2,'0')}:00`;

  // Save params for return from checkout
  localStorage.setItem('destiny_report_params', JSON.stringify({
    name, year, month, day, hour
  }));

  // Redirect to Lemon Squeezy with dynamic redirect URL
  const redirectUrl = encodeURIComponent('https://metaphysics-landing.vercel.app/report');
  window.location.href = `${CHECKOUT_LINK}?checkout[redirect_url]=${redirectUrl}`;
}

function esc(s) { return String(s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c]); }
</script>
</body>
</html>
